name = "code-review"
description = "Systematic code review methodology with checklist-based evaluation"
keywords = ["review", "code review", "审查", "code review", "评审"]

content = """
## 代码评审流程

### 必查清单
1. **功能性** — 逻辑正确吗？边界情况处理了吗？
2. **安全性** — 输入验证了吗？SQL 注入/XSS 防护？
3. **错误处理** — 所有错误都被包装/传播了吗？
4. **性能** — 有 N+1 查询或内存泄漏吗？
5. **可维护性** — 命名清晰吗？有重复代码吗？
6. **测试覆盖** — 关键路径有测试吗？

### 输出格式
对每个问题给出：文件:行号 → 问题描述 → 建议修复
"""
