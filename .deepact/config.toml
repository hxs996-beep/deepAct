# DeepAct CLI Configuration
# This is the default project-level config template.
# Copy to .deepact/config.toml in your project root.

[model]
# Default model for routine tasks (cheaper, faster)
default = "deepseek-v4-flash"
# Escalation model for complex/risky tasks
escalation = "deepseek-v4-flash"
# API provider: "deepseek" | "openrouter"
provider = "deepseek"
# API base URL (overrides provider if set)
base_url = ""
# API key loaded from env: DEEPSEEK_API_KEY

[routing]
# RiskScore threshold for model escalation (0.0 ~ 1.0)
risk_threshold = 0.55
# Max tool iterations per user turn before forcing diagnosis
max_iterations = 15
# Automatically escalate to Pro after repeated failures
auto_escalate_on_failure = true
# Reasoning mode: "auto" | "non-thinking" | "high" | "max"
default_reasoning = "auto"

[context]
# Max tokens budget for prompt assembly (conservative)
max_budget_tokens = 131072
# Max lines per code snippet included in context
snippet_max_lines = 200
# Max number of code snippets in working set
max_snippets = 5
# Force context rebase every N turns
compact_every_n_turns = 5

[guards]
# Enable scope guard (requires confirmation before destructive operations)
scope_guard = true

[conference]
# Enable multi-agent conference pipeline (plan → execute → review)
enabled = true

[permissions]
# Permission mode: "auto" | "ask" | "deny"
mode = "ask"
# Allow shell command execution
allow_shell = true
# Allow file write/edit operations
allow_write = true
# Commands that always require explicit approval
dangerous_commands = [
    "rm -rf",
    "git push --force",
    "git reset --hard",
    "DROP TABLE",
    "DELETE FROM",
    "chmod 777",
    "sudo",
]

[session]
# Directory for session JSONL files
storage_dir = "~/.deepact/sessions"
# Directory for content-addressed artifact store
artifact_dir = "~/.deepact/artifacts"
# Auto-save session events
auto_save = true

[ui]
# Theme: "auto" | "dark" | "light"
theme = "auto"
# Show model's thinking/reasoning process
show_thinking = false
# Show full tool output (vs digest only)
show_tool_output = true
# Show model routing decisions
show_routing = false

[lsp]
# Enable LSP integration for code intelligence
enabled = true
# Auto-detect language servers from project
auto_detect = true
# Specific language server configurations (override auto-detect)
# [lsp.servers.typescript]
# command = "typescript-language-server"
# args = ["--stdio"]
