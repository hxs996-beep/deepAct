name = "verification-before-completion"
description = "Use when about to claim any work is complete, fixed, or done - requires evidence before claims"
keywords = ["完成", "验证", "确认", "完成验证", "done", "fixed", "completed", "pass"]
next_skills = ["finishing-a-development-branch"]
content = """
## 完成前验证 — 铁律

没有验证证据就声称完成，是欺骗，不是高效。

### 铁律

在声称任何状态或表达满意之前：
1. **识别** — 什么命令能证明这个声明？
2. **运行** — 执行完整的命令（全新、完整运行）
3. **读取** — 完整输出，检查退出码，数失败数
4. **验证** — 输出确认声明了吗？
   - 否 → 陈述实际状态（带证据）
   - 是 → 陈述声明（带证据）
5. **然后才** — 做声明

跳过任何一步 = 说谎，不是验证。

### 常见失败模式

- "应该能工作了" → 运行验证命令
- "我很确信" → 信心 ≠ 证据
- "就这一次" → 没有例外
- "lint 通过了" → lint ≠ 编译器
- "Agent 说成功了" → 独立验证
- "我有点累了" → 累不是借口

### 什么时候必须应用

始终在以下场景前应用：
- 任何成功/完成声明
- 任何表示满意的表达
- 提交、创建 PR、任务完成
- 移动到下一个任务
- 委托子代理
"""
